<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to your ScoutSphere account" />
  <title>ScoutSphere – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-auth">
  <a href="dashboard.php" class="skip-link">Skip to main content</a>

  <!-- Animated sports icons in background -->
  <div class="sports-bg" aria-hidden="true">
    <div class="sports-icon icon1">⚽</div>
    <div class="sports-icon icon2">🏀</div>
    <div class="sports-icon icon3">⚾</div>
    <div class="sports-icon icon4">🏈</div>
    <div class="sports-icon icon5">🏐</div>
    <div class="sports-icon icon6">🎾</div>
    <div class="sports-icon icon7">🏉</div>
  </div>

  <header class="auth-header">
    <a href="index.html" class="logo" aria-label="ScoutSphere Home">ScoutSphere</a>
  </header>

  <main class="auth-container" id="main-content">
    <div class="auth-card glass-card">
      <div class="auth-header-text">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to your ScoutSphere account</p>
      </div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email or Username</label>
          <input 
            type="text" 
            id="email" 
            name="email" 
            placeholder="athlete@example.com" 
            required 
            autocomplete="username"
            aria-describedby="email-error"
          />
          <span class="error-message" id="email-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="••••••••" 
              required 
              autocomplete="current-password"
              aria-describedby="password-error"
            />
            <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <span class="eye-icon">👁️</span>
            </button>
          </div>
          <span class="error-message" id="password-error" role="alert"></span>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" name="remember" id="remember" />
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="text-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-loading" id="loginBtn">
          <span class="btn-text">Log In</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <div class="social-login">
          <button type="button" class="btn btn-social" aria-label="Sign in with Google">
            <span class="icon">G</span> Google
          </button>
          <button type="button" class="btn btn-social" aria-label="Sign in with Apple">
            <span class="icon">🍎</span> Apple
          </button>
        </div>

        <div class="auth-switch">
          Don't have an account? <a href="signup.html" class="text-link accent">Sign up</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="auth-footer">
    <p>© 2026 ScoutSphere. All rights reserved.</p>
  </footer>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="main.js"></script>
</body>
</html>
